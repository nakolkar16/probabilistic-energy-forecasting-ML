      size: 774
    params:
      params.yaml:
        global.seed: 42
        model_training.benchmark.locked_baseline: quantile_lag24_lag168_hour_dow
        model_training.benchmark.tune.candidates:
        - quantile_lag24_lag168
        - quantile_lag24_lag168_hour_dow
        - quantile_lag24_lag168_hour_dow_weekend
        - quantile_lag24_lag168_hour_dow_gen
        - quantile_lag24_lag168_hour_dow_weekend_gen
        - quantile_lag24_lag168_hour_dow_weekend_season
        - quantile_lag24_lag168_hour_dow_weekend_season_gen
        model_training.generation_features:
        - lignite_mwh
        - fossil_gas_mwh
        - hard_coal_mwh
        - photovoltaics_mwh
        - wind_onshore_mwh
        - gen_hydro_pumped_storage_mwh
        model_training.generation_lag_hours:
        - 24
        - 168
        model_training.input_path: data/validated/validated_data.parquet
        model_training.lags_hours:
        - 24
        - 168
        model_training.lightgbm_tuning.candidates:
        - lgbm_lag_only
        - lgbm_lag_time
        - lgbm_lag_time_weekend
        - lgbm_lag_time_season
        - lgbm_lag_time_gen_core
        - lgbm_lag_time_gen
        model_training.quantiles:
        - 0.1
        - 0.5
        - 0.9
        model_training.split.train_fraction: 0.8
        model_training.target_col: residual_load_mwh
        model_training.time_col: timestamp
