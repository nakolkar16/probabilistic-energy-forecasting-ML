    - path: src/utils/reproducibility.py
      hash: md5
      md5: 9a3f8059fa4a691d462639ef5070d80f
      size: 774
    params:
      params.yaml:
        global.seed: 42
        model_training.approval.baseline_max_crossing_rate: 0.007
        model_training.approval.baseline_min_coverage: 0.75
        model_training.backtest.coverage_tolerance: 0.05
        model_training.backtest.max_crossing_rate: 0.007
        model_training.backtest.min_fold_coverage: 0.75
        model_training.backtest.n_splits: 5
        model_training.benchmark.tune.alpha_grid:
        - 0.001
        - 0.01
        - 0.1
        - 0.3
        model_training.benchmark.tune.cv_splits: 3
        model_training.benchmark.tune.enabled: true
        model_training.lightgbm:
          objective: quantile
          learning_rate: 0.05
          n_estimators: 200
          num_leaves: 31
          min_child_samples: 20
          subsample: 0.9
          colsample_bytree: 0.9
          random_state: 42
        model_training.lightgbm_tuning:
          enabled: true
          score_metric: pinball_mean
          candidates:
          - lgbm_lag_core
          - lgbm_lag_calendar
          - lgbm_lag_calendar_rolling
          - lgbm_lag_calendar_rolling_gen
          race_cv_splits: 5
          tune_top_k: 2
          use_full_train_if_small: true
          small_data_threshold: 30000
          fraction:
            max_train_rows: 5000
            cv_splits: 5
          use_full_data_for_tuning: true
          optuna_trials: 40
          early_stopping_rounds: 50
          significance_alpha: 0.05
          out_of_time_recent_splits: 2
          shap_sample_size: 500
          random_state: 42
          min_improvement_pct: 0.01
          search_space:
            learning_rate:
              min: 0.01
              max: 0.2
            n_estimators:
              min: 100
              max: 400
            num_leaves:
              min: 15
              max: 127
            min_child_samples:
              min: 10
              max: 80
            subsample:
              min: 0.6
              max: 1.0
            colsample_bytree:
              min: 0.6
              max: 1.0
            reg_alpha:
              min: 0.0
              max: 5.0
            reg_lambda:
              min: 0.0
              max: 5.0
        model_training.mlflow:
          enabled: true
          tracking_uri: mlruns
          point_experiment: point_forecast_baselines
          quantile_lag_experiment: quantile_baseline_cyclic
          quantile_lag_time_experiment: quantile_baseline_cyclic
          lightgbm_lag_time_experiment: lightgbm_simplified_feature_race
          lightgbm_lag_time_gen_experiment: lightgbm_simplified_feature_race
          lightgbm_tuning_experiment: simplified_top2_lgbm_tuning
        model_training.point_models.linear_regression.fit_intercept: true
        model_training.quantile_regression.alpha: 0.01
        model_training.quantile_regression.solver: highs
        model_training.quantiles:
        - 0.1
        - 0.5
        - 0.9
        model_training.split.val_fraction_within_train: 0.2
        model_training.target_col: residual_load_mwh
